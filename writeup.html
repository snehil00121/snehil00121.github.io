<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snehil Shourya | Writeup</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Highlight.js for Code blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="cursor-glow"></div>
    
    <nav class="navbar glass">
        <div class="logo">
            <span class="glitch" data-text="Terminal">Terminal</span>
        </div>

            <li><a href="index.html" class="active">&lt; Back to Dashboard</a></li>

            <div class="container writeup-layout">

                <article class="glass" style="padding: 3rem; position: relative;">

        </section>

    <footer>
        <p class="subtitle_mono">&gt; EOF Snehil Shourya © 2026. Built with Express & Vanilla JS.</p>
    </footer>
